name: On Action Release

on:
  repository_dispatch:
    types: [ action-release ]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get Pushinator token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.PUSHINATOR_ID }}
          private-key: ${{ secrets.PUSHINATOR_KEY }}

      - name: Checkout website repo
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Checkout Action repo
        uses: actions/checkout@v7
        with:
          repository: helpers4/action
          ref: v${{ github.event.client_payload.version }}
          path: _action

      - name: Generate Action docs
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          ln -sfn "${GH_WORKSPACE}/_action" "${GH_WORKSPACE}/../action"
          node scripts/generate-action-docs.js

      - name: Commit and push updated docs
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "pushinator[bot]"
          git config user.email "pushinator[bot]@users.noreply.github.com"
          git add docs/github-action/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(lib-action): 🔧 update docs for v${RELEASE_VERSION}"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push updated docs after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done
