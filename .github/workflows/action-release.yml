name: Release Triggered - Action

on:
  repository_dispatch:
    types: [ action-release ]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Checkout Action repo
        uses: actions/checkout@v6
        with:
          repository: helpers4/action
          path: _action

      - name: Generate Action docs
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          # The generate script reads from ../action/
          ln -sfn "${GH_WORKSPACE}/_action" "${GH_WORKSPACE}/../action"
          node scripts/generate-action-docs.js

      - name: Build all & deploy
        run: |
          pnpm build:all

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=helpers4
