name: Build and Deploy to Cloudflare Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      typescript-version:
        description: >-
          TypeScript release version to fetch build artifacts from (e.g. 2.0.0).
          Leave empty to use committed docs.
        required: false
        type: string

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Regenerate TypeScript docs (if version specified)
        if: inputs.typescript-version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_TS_VERSION: ${{ inputs.typescript-version }}
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          VERSION="${INPUT_TS_VERSION}"
          echo "📦 Downloading TypeScript build artifacts for v${VERSION}..."

          gh release download "v${VERSION}" \
            --repo helpers4/typescript \
            --pattern "build-meta.tar.gz" \
            --dir /tmp

          mkdir -p /tmp/typescript/build
          tar -xzf /tmp/build-meta.tar.gz -C /tmp/typescript/build

          ln -sfn /tmp/typescript "${GH_WORKSPACE}/../typescript"
          node scripts/generate-typescript-docs.js

      - name: Regenerate DevContainer docs
        continue-on-error: true
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          if [ -d "${GH_WORKSPACE}/../devcontainer" ]; then
            node scripts/generate-devcontainer-docs.js
          else
            echo "⚠ DevContainer repo not available, using committed docs"
          fi

      - name: Regenerate Action docs
        continue-on-error: true
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          if [ -d "${GH_WORKSPACE}/../action" ]; then
            node scripts/generate-action-docs.js
          else
            echo "⚠ Action repo not available, using committed docs"
          fi

      - name: Build all packages
        run: pnpm build:all

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=helpers4
