name: Release Triggered - TypeScript

on:
  repository_dispatch:
    types: [ typescript-release ]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Download TypeScript build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          echo "📦 Downloading build artifacts for v${RELEASE_VERSION}..."

          # Download the release asset from the typescript repo
          gh release download "v${RELEASE_VERSION}" \
            --repo helpers4/typescript \
            --pattern "build-meta.tar.gz" \
            --dir /tmp

          # Extract meta files into a temporary typescript/build structure
          mkdir -p /tmp/typescript/build
          tar -xzf /tmp/build-meta.tar.gz -C /tmp/typescript/build

      - name: Generate TypeScript docs from build artifacts
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          # The generate script reads from ../typescript/build/*/meta/
          # We symlink the downloaded artifacts
          ln -sfn /tmp/typescript "${GH_WORKSPACE}/../typescript"
          node scripts/generate-typescript-docs.js

      - name: Build all & deploy
        run: |
          pnpm build:all

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=helpers4
