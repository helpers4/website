name: On DevContainer Release

on:
  repository_dispatch:
    types: [ devcontainer-release ]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Pushinator token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PUSHINATOR_ID }}
          private-key: ${{ secrets.PUSHINATOR_KEY }}

      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Checkout DevContainer repo
        uses: actions/checkout@v6
        with:
          repository: helpers4/devcontainer
          path: _devcontainer

      - name: Generate DevContainer docs
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          ln -sfn "${GH_WORKSPACE}/_devcontainer" "${GH_WORKSPACE}/../devcontainer"
          node scripts/generate-devcontainer-docs.js

      - name: Commit and push updated docs
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "pushinator[bot]"
          git config user.email "pushinator[bot]@users.noreply.github.com"
          git add docs/devcontainer/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(lib-devcontainer): 🔧 update docs for v${RELEASE_VERSION}"
          git push origin main
