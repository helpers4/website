name: On TypeScript Release

on:
  repository_dispatch:
    types: [ typescript-release ]

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Get Pushinator token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PUSHINATOR_ID }}
          private-key: ${{ secrets.PUSHINATOR_KEY }}

      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Download TypeScript build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          echo "📦 Downloading build artifacts for v${RELEASE_VERSION}..."
          gh release download "v${RELEASE_VERSION}" \
            --repo helpers4/typescript \
            --pattern "build-meta.tar.gz" \
            --dir /tmp
          mkdir -p /tmp/typescript/build
          if tar -tzf /tmp/build-meta.tar.gz | grep -Eq '(^/|(^|/)\.\.(/|$))'; then
            echo "Unsafe path detected in build-meta.tar.gz"
            exit 1
          fi
          if tar -tvf /tmp/build-meta.tar.gz | awk '{print $1}' | grep -Eq '^[lh]'; then
            echo "Symlink or hardlink detected in build-meta.tar.gz"
            exit 1
          fi
          tar -xzf /tmp/build-meta.tar.gz \
            -C /tmp/typescript/build \
            --no-same-owner \
            --no-same-permissions

      - name: Generate TypeScript docs from build artifacts
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          ln -sfn /tmp/typescript "${GH_WORKSPACE}/../typescript"
          node scripts/generate-typescript-docs.js

      - name: Commit and push updated docs
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "pushinator[bot]"
          git config user.email "pushinator[bot]@users.noreply.github.com"
          git add docs/typescript/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(lib-typescript): 🔧 update docs for v${RELEASE_VERSION}"
          for attempt in 1 2 3; do
            git fetch origin main
            if git rebase origin/main && git push origin HEAD:main; then
              exit 0
            fi
            git rebase --abort || true
            if [ "${attempt}" -eq 3 ]; then
              echo "Failed to push updated docs after ${attempt} attempts"
              exit 1
            fi
            sleep $((attempt * 5))
          done
