name: On TypeScript Release

on:
  repository_dispatch:
    types: [ typescript-release ]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get Pushinator token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.PUSHINATOR_ID }}
          private-key: ${{ secrets.PUSHINATOR_KEY }}

      - name: Checkout website repo
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Download TypeScript build artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          echo "📦 Downloading build artifacts for v${RELEASE_VERSION}..."
          gh release download "v${RELEASE_VERSION}" \
            --repo helpers4/typescript \
            --pattern "build-meta.tar.gz" \
            --dir /tmp
          mkdir -p /tmp/typescript/build
          tar -xzf /tmp/build-meta.tar.gz -C /tmp/typescript/build

      - name: Generate TypeScript docs from build artifacts
        env:
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          ln -sfn /tmp/typescript "${GH_WORKSPACE}/../typescript"
          node scripts/generate-typescript-docs.js

      - name: Commit and push updated docs
        env:
          RELEASE_VERSION: ${{ github.event.client_payload.version }}
        run: |
          git config user.name "pushinator[bot]"
          git config user.email "pushinator[bot]@users.noreply.github.com"
          git add docs/typescript/
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(lib-typescript): 🔧 update docs for v${RELEASE_VERSION}"
          git push origin main
