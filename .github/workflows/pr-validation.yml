name: Pull Request Validation

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Check conventional commits
        uses: helpers4/action/conventional-commits@main
        with:
          checkout: "true"
          scopes: "landing|docs|lib-typescript|lib-devcontainer|lib-action|build|CI-CD|license|devcontainer|dependabot|CODEOWNERS|deploy|AGENTS|installation|typescript|pr-validation"
          pr-comment: "error"

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  build:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Generate documentation
        run: |
          pnpm generate-docs:typescript || true
          pnpm generate-docs:devcontainer || true
          pnpm generate-docs:action || true

      - name: Build all packages
        run: pnpm build:all

      - name: Merge builds
        run: pnpm merge-builds

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  typecheck:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.status.outputs.status }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 9

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: |
          pnpm --filter landing exec tsc --noEmit

      - name: Set status
        id: status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
          fi

  pr-comment:
    runs-on: ubuntu-latest
    needs: [conventional-commits, build, typecheck]
    if: always()
    steps:
      - name: Update PR comment
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const jobs = {
              '🧾 Conventional Commits': "${{ needs.conventional-commits.outputs.status || 'unknown' }}",
              '🏗️ Build': "${{ needs.build.outputs.status || 'unknown' }}",
              '📘 TypeCheck': "${{ needs.typecheck.outputs.status || 'unknown' }}",
            };

            const rows = Object.entries(jobs).map(([job, status]) => {
              const icon = status === 'success' ? '✅' :
                         status === 'failure' ? '❌' :
                         status === 'skipped' ? '⏭️' : '⚠️';
              const badge = status === 'success' ? '`passing`' :
                           status === 'failure' ? '`failing`' :
                           status === 'skipped' ? '`skipped`' : '`unknown`';
              return `| ${icon} | **${job}** | ${badge} |`;
            }).join('\n');

            const passedCount = Object.values(jobs).filter(s => s === 'success').length;
            const totalJobs = Object.keys(jobs).length;
            const allPassed = passedCount === totalJobs;

            const statusBanner = allPassed
              ? '## ✅ PR Validation Passed\n\n> All checks passed!'
              : `## ❌ PR Validation Failed\n\n> ${passedCount}/${totalJobs} checks passed`;

            const comment = `${statusBanner}

            ---

            ### 📋 Pipeline Status

            | | Job | Status |
            |:---:|-----|:------:|
            ${rows}

            ---

            <sub>🤖 Generated by **@helpers4** CI • ${new Date().toISOString().split('T')[0]}</sub>`;

            try {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Validation')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              }
            } catch (error) {
              console.error('Error updating PR comment:', error);
            }
