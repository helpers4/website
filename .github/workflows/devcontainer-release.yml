name: Release Triggered - DevContainer

on:
  repository_dispatch:
    types: [ devcontainer-release ]

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Install dependencies
        env:
          NPM_TOKEN_WEB_AWESOME: ${{ secrets.NPM_TOKEN_WEB_AWESOME }}
        run: pnpm install --frozen-lockfile

      - name: Checkout DevContainer repo
        uses: actions/checkout@v6
        with:
          repository: helpers4/devcontainer
          path: _devcontainer

      - name: Generate DevContainer docs
        run: |
          # The generate script reads from ../devcontainer/src/
          ln -sfn "${{ github.workspace }}/_devcontainer" "${{ github.workspace }}/../devcontainer"
          node scripts/generate-devcontainer-docs.js

      - name: Build all & deploy
        run: |
          pnpm build:all

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=helpers4
